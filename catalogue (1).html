<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Family - Choisissez les jeux</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&family=Open+Sans&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #FFF8F0;
            color: #2D3436;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        h1, h2, h3 {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            color: #4A90D9;
        }
        .header {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #4A90D9, #FFD93D);
            color: white;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        .header h1 {
            color: white;
            margin-bottom: 5px;
        }
        .header p {
            font-size: 1.1em;
            margin: 0;
        }
        .age-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .age-tab {
            padding: 12px 25px;
            border: 3px solid #4A90D9;
            background-color: white;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 1em;
            transition: all 0.3s;
            color: #4A90D9;
        }
        .age-tab:hover {
            background-color: #4A90D9;
            color: white;
        }
        .age-tab.active {
            background-color: #4A90D9;
            color: white;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .game-card {
            background-color: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            position: relative;
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .game-card.selected {
            border: 4px solid #FF7B42;
            box-shadow: 0 0 20px rgba(255, 123, 66, 0.4);
        }
        .game-card .checkbox {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background-color: white;
            border: 3px solid #ccc;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            z-index: 2;
            transition: all 0.2s;
        }
        .game-card.selected .checkbox {
            background-color: #FF7B42;
            border-color: #FF7B42;
            color: white;
        }
        .game-image {
            width: 100%;
            height: 180px;
            background-color: #E8F0FE;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
            position: relative;
        }
        .game-info {
            padding: 15px;
        }
        .game-info h3 {
            margin: 0 0 5px 0;
            font-size: 1.2em;
        }
        .game-info .players {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
        }
        .game-info .description {
            font-size: 0.9em;
            color: #555;
            line-height: 1.4;
        }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 800;
            margin-right: 5px;
        }
        .badge-coop {
            background-color: #FFD93D;
            color: #2D3436;
        }
        .badge-facile {
            background-color: #A8E6CF;
            color: #2D3436;
        }
        .badge-competition {
            background-color: #FF8B94;
            color: white;
        }
        .selected-bar {
            position: sticky;
            bottom: 20px;
            background-color: #2D3436;
            color: white;
            padding: 20px 30px;
            border-radius: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 10;
        }
        .selected-bar .count {
            font-size: 1.1em;
            font-weight: 800;
        }
        .btn {
            background-color: #FF7B42;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-back {
            background-color: transparent;
            color: white;
            border: 2px solid white;
            margin-right: 10px;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Header -->
        <div class="header">
            <h1>🏠 Arcade Family</h1>
            <p>Choisissez les jeux pour vos enfants</p>
        </div>

        <!-- Age Tabs -->
        <div class="age-tabs">
            <button class="age-tab active" onclick="filterGames('all', this)">🌟 Tous</button>
            <button class="age-tab" onclick="filterGames('3-6', this)">🧸 3-6 ans</button>
            <button class="age-tab" onclick="filterGames('7-10', this)">🎮 7-10 ans</button>
            <button class="age-tab" onclick="filterGames('11+', this)">🐉 11+ ans</button>
        </div>

        <!-- Games Grid -->
        <h2 id="games-title">🌟 Tous les jeux disponibles</h2>
        <div class="games-grid" id="gamesGrid">
            <!-- Les jeux seront générés ici par JavaScript -->
        </div>

        <!-- Barre de sélection -->
        <div class="selected-bar" id="selectedBar">
            <span class="count" id="selectedCount">🎮 0 jeu sélectionné</span>
            <div>
                <a href="accueil.html" class="btn-back">← Retour</a>
                <button class="btn" onclick="generatePack()">📥 Générer mon pack</button>
            </div>
        </div>

    </div>

    <script>
        // Base de données des jeux
        const games = [
            {
                id: 1,
                name: "Pac-Man",
                emoji: "🟡",
                age: "3-6",
                players: "1 joueur",
                description: "Mange les pac-gommes et fuis les fantômes dans ce classique indémodable.",
                badges: ["facile"],
                selected: false
            },
            {
                id: 2,
                name: "Donkey Kong",
                emoji: "🦍",
                age: "3-6",
                players: "1 joueur",
                description: "Saute par-dessus les tonneaux pour sauver la princesse !",
                badges: ["facile"],
                selected: false
            },
            {
                id: 3,
                name: "Bubble Bobble",
                emoji: "🫧",
                age: "3-6",
                players: "2 joueurs",
                description: "Deux petits dinosaures qui font des bulles. Mignon et amusant !",
                badges: ["coop", "facile"],
                selected: false
            },
            {
                id: 4,
                name: "Snow Bros",
                emoji: "⛄",
                age: "3-6",
                players: "2 joueurs",
                description: "Lance des boules de neige et transforme les ennemis en boules qui roulent !",
                badges: ["coop", "facile"],
                selected: false
            },
            {
                id: 5,
                name: "Puzzle Bobble",
                emoji: "🫧",
                age: "3-6",
                players: "2 joueurs",
                description: "Associe les bulles de la même couleur. Simple et addictif.",
                badges: ["facile"],
                selected: false
            },
            {
                id: 6,
                name: "Frogger",
                emoji: "🐸",
                age: "3-6",
                players: "1 joueur",
                description: "Aide la grenouille à traverser la route et la rivière sans se faire écraser.",
                badges: ["facile"],
                selected: false
            },
            {
                id: 7,
                name: "Teenage Mutant Ninja Turtles",
                emoji: "🐢",
                age: "7-10",
                players: "4 joueurs",
                description: "Les tortues ninja combattent le crime. Action et pizza !",
                badges: ["coop"],
                selected: false
            },
            {
                id: 8,
                name: "The Simpsons",
                emoji: "💛",
                age: "7-10",
                players: "4 joueurs",
                description: "Retrouve Maggie avec toute la famille Simpson. Fou rire garanti.",
                badges: ["coop"],
                selected: false
            },
            {
                id: 9,
                name: "Super Mario Bros",
                emoji: "🍄",
                age: "7-10",
                players: "2 joueurs",
                description: "Le plombier le plus célèbre du monde saute sur les champignons.",
                badges: [],
                selected: false
            },
            {
                id: 10,
                name: "Cadillacs & Dinosaurs",
                emoji: "🦖",
                age: "7-10",
                players: "3 joueurs",
                description: "Bagarre dans un monde peuplé de dinosaures. Action cartoon.",
                badges: ["coop"],
                selected: false
            },
            {
                id: 11,
                name: "Metal Slug 3",
                emoji: "🔫",
                age: "7-10",
                players: "2 joueurs",
                description: "Course et tir dans un style cartoon. Explosions et véhicules fous.",
                badges: ["coop"],
                selected: false
            },
            {
                id: 12,
                name: "Pang !",
                emoji: "🎈",
                age: "7-10",
                players: "2 joueurs",
                description: "Fais éclater les ballons qui rebondissent partout. Coopération et réflexes.",
                badges: ["coop", "facile"],
                selected: false
            },
            {
                id: 13,
                name: "Street Fighter II",
                emoji: "🥊",
                age: "11+",
                players: "2 joueurs",
                description: "Le jeu de combat légendaire. Choisis ton personnage et affronte tes amis.",
                badges: ["competition"],
                selected: false
            },
            {
                id: 14,
                name: "Marvel vs Capcom",
                emoji: "🦸",
                age: "11+",
                players: "2 joueurs",
                description: "Les super-héros Marvel affrontent les personnages Capcom. Spectaculaire !",
                badges: ["competition"],
                selected: false
            },
            {
                id: 15,
                name: "Metal Slug X",
                emoji: "💥",
                age: "11+",
                players: "2 joueurs",
                description: "Version plus corsée du célèbre jeu d'action. Du challenge !",
                badges: ["coop"],
                selected: false
            }
        ];

        let selectedGames = [];

        // Afficher les jeux
        function displayGames(filteredGames) {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = '';

            filteredGames.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card' + (game.selected ? ' selected' : '');
                card.onclick = () => toggleGame(game);

                card.innerHTML = `
                    <div class="checkbox">${game.selected ? '✓' : ''}</div>
                    <div class="game-image">${game.emoji}</div>
                    <div class="game-info">
                        <h3>${game.name}</h3>
                        <div class="players">👥 ${game.players}</div>
                        <div class="description">${game.description}</div>
                        <div style="margin-top: 8px;">
                            ${game.badges.includes('coop') ? '<span class="badge badge-coop">🤝 Coop</span>' : ''}
                            ${game.badges.includes('facile') ? '<span class="badge badge-facile">🌟 Facile</span>' : ''}
                            ${game.badges.includes('competition') ? '<span class="badge badge-competition">🏆 Compétition</span>' : ''}
                        </div>
                    </div>
                `;

                grid.appendChild(card);
            });

            updateSelectedBar();
        }

        // Sélectionner / désélectionner un jeu
        function toggleGame(game) {
            game.selected = !game.selected;
            if (game.selected) {
                selectedGames.push(game);
            } else {
                selectedGames = selectedGames.filter(g => g.id !== game.id);
            }
            displayGames(getCurrentGames());
        }

        // Filtrer par âge
        function filterGames(age, tabElement) {
            // Mettre à jour les onglets
            document.querySelectorAll('.age-tab').forEach(tab => tab.classList.remove('active'));
            tabElement.classList.add('active');

            // Mettre à jour le titre
            const titles = {
                'all': '🌟 Tous les jeux disponibles',
                '3-6': '🧸 Jeux pour les 3-6 ans',
                '7-10': '🎮 Jeux pour les 7-10 ans',
                '11+': '🐉 Jeux pour les 11 ans et plus'
            };
            document.getElementById('games-title').textContent = titles[age];

            displayGames(getCurrentGames(age));
        }

        function getCurrentGames(age = 'all') {
            if (age === 'all') return games;
            return games.filter(g => g.age === age);
        }

        // Mettre à jour la barre de sélection
        function updateSelectedBar() {
            const count = selectedGames.length;
            const countElement = document.getElementById('selectedCount');
            countElement.textContent = `🎮 ${count} jeu${count > 1 ? 'x' : ''} sélectionné${count > 1 ? 's' : ''}`;
        }

        // Générer le pack
        function generatePack() {
            if (selectedGames.length === 0) {
                alert("🎮 Sélectionnez au moins un jeu avant de générer le pack !");
                return;
            }
            const names = selectedGames.map(g => g.name).join(', ');
            alert(`📦 Pack généré avec ${selectedGames.length} jeu(x) :\n\n${names}\n\n➡️ La page de téléchargement arrive bientôt !`);
        }

        // Initialisation
        displayGames(games);
    </script>

</body>
</html>
