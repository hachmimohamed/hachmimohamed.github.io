<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Family - Choisissez les jeux</title>
    <link rel="icon" type="image/png" sizes="32x32" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%234A90D9'/><text x='16' y='22' text-anchor='middle' font-size='18' font-weight='bold' fill='white' font-family='Arial'>AF</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&family=Open+Sans&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #FFF8F0;
            color: #2D3436;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        h1, h2, h3 {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            color: #4A90D9;
        }
        .header {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #4A90D9, #FFD93D);
            color: white;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        .header h1 {
            color: white;
            margin-bottom: 5px;
        }
        .header p {
            font-size: 1.1em;
            margin: 0;
        }
        .age-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .age-tab {
            padding: 12px 25px;
            border: 3px solid #4A90D9;
            background-color: white;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 1em;
            transition: all 0.3s;
            color: #4A90D9;
        }
        .age-tab:hover {
            background-color: #4A90D9;
            color: white;
        }
        .age-tab.active {
            background-color: #4A90D9;
            color: white;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .game-card {
            background-color: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            position: relative;
            border: 3px solid transparent;
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .game-card.selected {
            border-color: #FF7B42;
            box-shadow: 0 0 20px rgba(255, 123, 66, 0.4);
        }
        .game-card .checkbox {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background-color: white;
            border: 3px solid #ccc;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            z-index: 2;
            transition: all 0.2s;
        }
        .game-card.selected .checkbox {
            background-color: #FF7B42;
            border-color: #FF7B42;
            color: white;
        }
        .game-image {
            width: 100%;
            height: 180px;
            background-color: #E8F0FE;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
            position: relative;
        }
        .game-info {
            padding: 15px;
        }
        .game-info h3 {
            margin: 0 0 5px 0;
            font-size: 1.2em;
        }
        .game-info .players {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
        }
        .game-info .description {
            font-size: 0.9em;
            color: #555;
            line-height: 1.4;
        }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 800;
            margin-right: 5px;
        }
        .badge-coop {
            background-color: #FFD93D;
            color: #2D3436;
        }
        .badge-facile {
            background-color: #A8E6CF;
            color: #2D3436;
        }
        .badge-competition {
            background-color: #FF8B94;
            color: white;
        }
        .selected-bar {
            position: sticky;
            bottom: 20px;
            background-color: #2D3436;
            color: white;
            padding: 20px 30px;
            border-radius: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 10;
            flex-wrap: wrap;
            gap: 10px;
        }
        .selected-bar .count {
            font-size: 1.1em;
            font-weight: 800;
        }
        .btn {
            background-color: #FF7B42;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #E56A35;
        }
        .btn-back {
            background-color: transparent;
            color: white;
            border: 2px solid white;
            margin-right: 10px;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            transition: all 0.3s;
        }
        .btn-back:hover {
            background-color: white;
            color: #2D3436;
        }
        footer {
            text-align: center;
            padding: 30px;
            margin-top: 40px;
            border-top: 1px solid #DDD;
            color: #888;
            font-size: 0.9em;
        }
        footer a {
            color: #4A90D9;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            .games-grid {
                grid-template-columns: 1fr;
            }
            .selected-bar {
                flex-direction: column;
                text-align: center;
                border-radius: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Header -->
        <div class="header">
            <h1>🏠 Arcade Family</h1>
            <p>Choisissez les jeux pour vos enfants</p>
        </div>

        <!-- Age Tabs -->
        <div class="age-tabs">
            <button class="age-tab active" onclick="filterGames('all', this)">🌟 Tous</button>
            <button class="age-tab" onclick="filterGames('3-6', this)">🧸 3-6 ans</button>
            <button class="age-tab" onclick="filterGames('7-10', this)">🎮 7-10 ans</button>
            <button class="age-tab" onclick="filterGames('11+', this)">🐉 11+ ans</button>
        </div>

        <!-- Games Grid -->
        <h2 id="games-title">🌟 Tous les jeux disponibles</h2>
        <div class="games-grid" id="gamesGrid">
            <!-- Les jeux seront générés ici par JavaScript -->
        </div>

        <!-- Barre de sélection -->
        <div class="selected-bar" id="selectedBar">
            <span class="count" id="selectedCount">🎮 0 jeu sélectionné</span>
            <div>
                <a href="index.html" class="btn-back">← Retour</a>
                <button class="btn" onclick="generatePack()">📥 Générer mon pack</button>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <footer>
        <p>
            <a href="index.html">Accueil</a> &nbsp;|&nbsp;
            <a href="catalogue.html">Catalogue</a> &nbsp;|&nbsp;
            <a href="telechargement.html">Téléchargement</a> &nbsp;|&nbsp;
            <a href="faq.html">FAQ</a> &nbsp;|&nbsp;
            <a href="partenaires.html">Partenaires</a> &nbsp;|&nbsp;
            <a href="mentions-legales.html">Mentions légales</a>
        </p>
        <p>© 2026 Arcade Family - L'arcade sécurisée pour vos enfants 🏠🎮</p>
    </footer>

    <script>
        // Base de données des jeux - VOS 14 JEUX
        const games = [
            // 🧸 3-6 ans
            {
                id: 1,
                name: "Pac-Man",
                emoji: "🟡",
                age: "3-6",
                players: "1 joueur",
                description: "Mange les pac-gommes et fuis les fantômes dans ce classique indémodable.",
                badges: ["facile"],
                rom: "pacman.zip",
                selected: false
            },
            {
                id: 2,
                name: "Bubble Bobble 2",
                emoji: "🫧",
                age: "3-6",
                players: "2 joueurs",
                description: "Deux petits dinosaures font des bulles pour capturer leurs ennemis. Suite du célèbre classique.",
                badges: ["coop", "facile"],
                rom: "bublbob2.zip",
                selected: false
            },
            {
                id: 3,
                name: "Puzzle Bobble 2",
                emoji: "🫧",
                age: "3-6",
                players: "2 joueurs",
                description: "Associe les bulles de la même couleur. Simple, coloré et addictif.",
                badges: ["facile"],
                rom: "pbobble2.zip",
                selected: false
            },
            {
                id: 4,
                name: "Pang",
                emoji: "🎈",
                age: "3-6",
                players: "2 joueurs",
                description: "Fais éclater les ballons qui rebondissent partout. Coopération et réflexes !",
                badges: ["coop", "facile"],
                rom: "pang.zip",
                selected: false
            },

            // 🎮 7-10 ans
            {
                id: 5,
                name: "Cadillacs & Dinosaurs",
                emoji: "🦖",
                age: "7-10",
                players: "3 joueurs",
                description: "Bagarre dans un monde peuplé de dinosaures. Action cartoon et fun garanti.",
                badges: ["coop"],
                rom: "dino.zip",
                selected: false
            },
            {
                id: 6,
                name: "Teenage Mutant Ninja Turtles",
                emoji: "🐢",
                age: "7-10",
                players: "4 joueurs",
                description: "Les tortues ninja combattent le crime. Action et pizza !",
                badges: ["coop"],
                rom: "tmnt.zip",
                selected: false
            },
            {
                id: 7,
                name: "The Simpsons",
                emoji: "💛",
                age: "7-10",
                players: "4 joueurs",
                description: "Retrouve Maggie avec toute la famille Simpson. Fou rire garanti.",
                badges: ["coop"],
                rom: "simpsons.zip",
                selected: false
            },
            {
                id: 8,
                name: "Final Fight",
                emoji: "👊",
                age: "7-10",
                players: "2 joueurs",
                description: "Le roi du beat'em up. Cogne les voyous et sauve la ville !",
                badges: ["coop"],
                rom: "ffight.zip",
                selected: false
            },
            {
                id: 9,
                name: "Metal Slug 2",
                emoji: "🔫",
                age: "7-10",
                players: "2 joueurs",
                description: "Course et tir dans un style cartoon. Explosions et véhicules fous.",
                badges: ["coop"],
                rom: "mslug2.zip",
                selected: false
            },
            {
                id: 10,
                name: "Astérix",
                emoji: "⚔️",
                age: "7-10",
                players: "2 joueurs",
                description: "Astérix et Obélix cognent les romains. Beat'em up gaulois hilarant !",
                badges: ["coop"],
                rom: "asterix.zip",
                selected: false
            },
            {
                id: 11,
                name: "Capitaine Commando",
                emoji: "🧢",
                age: "7-10",
                players: "4 joueurs",
                description: "Une équipe de super-héros combat le crime dans le futur. Action coopérative.",
                badges: ["coop"],
                rom: "captcomm.zip",
                selected: false
            },
            {
                id: 12,
                name: "Wonder Boy",
                emoji: "🏃",
                age: "7-10",
                players: "1 joueur",
                description: "Aventure et plateforme colorée. Saute, cours et explore des mondes magiques.",
                badges: [],
                rom: "wboy.zip",
                selected: false
            },

            // 🐉 11+ ans
            {
                id: 13,
                name: "Marvel vs Capcom",
                emoji: "🦸",
                age: "11+",
                players: "2 joueurs",
                description: "Les super-héros Marvel affrontent les personnages Capcom. Spectaculaire !",
                badges: ["competition"],
                rom: "mvsc.zip",
                selected: false
            },
            {
                id: 14,
                name: "Street Fighter Alpha 3",
                emoji: "🥊",
                age: "11+",
                players: "2 joueurs",
                description: "Un des meilleurs jeux de combat de tous les temps. Choisis ton combattant !",
                badges: ["competition"],
                rom: "sfa3.zip",
                selected: false
            }
        ];

        let selectedGames = [];

        // Afficher les jeux
        function displayGames(filteredGames) {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = '';

            filteredGames.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card' + (game.selected ? ' selected' : '');
                card.onclick = () => toggleGame(game);

                card.innerHTML = `
                    <div class="checkbox">${game.selected ? '✓' : ''}</div>
                    <div class="game-image">${game.emoji}</div>
                    <div class="game-info">
                        <h3>${game.name}</h3>
                        <div class="players">👥 ${game.players}</div>
                        <div class="description">${game.description}</div>
                        <div style="margin-top: 8px;">
                            ${game.badges.includes('coop') ? '<span class="badge badge-coop">🤝 Coop</span>' : ''}
                            ${game.badges.includes('facile') ? '<span class="badge badge-facile">🌟 Facile</span>' : ''}
                            ${game.badges.includes('competition') ? '<span class="badge badge-competition">🏆 Compétition</span>' : ''}
                        </div>
                    </div>
                `;

                grid.appendChild(card);
            });

            updateSelectedBar();
        }

        // Sélectionner / désélectionner un jeu
        function toggleGame(game) {
            game.selected = !game.selected;
            if (game.selected) {
                selectedGames.push(game);
            } else {
                selectedGames = selectedGames.filter(g => g.id !== game.id);
            }
            displayGames(getCurrentGames());
        }

        // Filtrer par âge
        function filterGames(age, tabElement) {
            document.querySelectorAll('.age-tab').forEach(tab => tab.classList.remove('active'));
            tabElement.classList.add('active');

            const titles = {
                'all': '🌟 Tous les jeux disponibles',
                '3-6': '🧸 Jeux pour les 3-6 ans',
                '7-10': '🎮 Jeux pour les 7-10 ans',
                '11+': '🐉 Jeux pour les 11 ans et plus'
            };
            document.getElementById('games-title').textContent = titles[age];

            displayGames(getCurrentGames(age));
        }

        function getCurrentGames(age = 'all') {
            if (age === 'all') return games;
            return games.filter(g => g.age === age);
        }

        // Mettre à jour la barre de sélection
        function updateSelectedBar() {
            const count = selectedGames.length;
            const countElement = document.getElementById('selectedCount');
            countElement.textContent = `🎮 ${count} jeu${count > 1 ? 'x' : ''} sélectionné${count > 1 ? 's' : ''}`;
        }

        // Générer le pack
        function generatePack() {
            if (selectedGames.length === 0) {
                alert("🎮 Sélectionnez au moins un jeu avant de générer le pack !");
                return;
            }
            window.location.href = "telechargement.html";
        }

        // Récupérer l'âge depuis l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const ageFromUrl = urlParams.get('age');

        if (ageFromUrl) {
            const tabs = document.querySelectorAll('.age-tab');
            tabs.forEach(tab => {
                const onclickAttr = tab.getAttribute('onclick');
                if (onclickAttr && onclickAttr.includes(`'${ageFromUrl}'`)) {
                    tab.click();
                }
            });
        }

        // Initialisation
        displayGames(games);
    </script>

</body>
</html>
